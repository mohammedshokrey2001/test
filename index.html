<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFawry Payment</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px 25px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 340px;
            width: 90%;
        }

       

        h2 {
            margin: 10px 0;
            color: #222;
        }

        p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .btn {
            margin-top: 20px;
            background: #ffcc00;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

<div class="card">

    

    <h2>Secure Payment</h2>

    <p>
        You will be redirected to the <b>MyFawry App</b><br>
        to complete your payment securely.
    </p>

    <button class="btn" onclick="openApp()">
        Pay With MyFawry
    </button>

</div>

<script>
function openApp() {

    const intentUrl = "https://fawry.page.link/AhlMisr"
    window.location.href = intentUrl;
}
</script>

</body>
</html>
